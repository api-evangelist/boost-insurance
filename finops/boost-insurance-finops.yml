meters:
- name: policies_issued
  description: Policies bound and issued through the Boost PAS API.
  unit: policies
  aggregation: sum
  dimensions:
  - partner
  - program
- name: premium_written
  description: Insurance premium written across issued policies (program economics).
  unit: currency
  aggregation: sum
  dimensions:
  - partner
  - program
- name: claims_filed
  description: First Notice of Loss (FNOL) claims filed against in-force policies.
  unit: claims
  aggregation: sum
  dimensions:
  - partner
  - program
principles:
- name: Visibility
  description: Track policies issued, premium written, and claims volume per program and partner.
- name: Allocation
  description: Map program economics and program fees to internal cost centers and product lines.
- name: Optimization
  description: Tune program design, coverage, and loss ratios with Boost rather than optimizing API call volume.
- name: Accountability
  description: Assign owners per insurance program; review premium, fees, and loss performance against budget.
