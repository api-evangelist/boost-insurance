description: >-
  FinOps view of Boost Insurance partner spend. Boost is sales-led and
  partner-gated with no public API rate card; cost is driven by insurance
  program economics (premium, program fees, and risk-sharing) negotiated per
  program rather than per-call API metering. This artifact captures the FinOps
  posture and candidate meters at a conceptual level; concrete rates and charge
  categories are not reconciled because Boost does not publish them publicly.
notes: >-
  Replace conceptual meters with actual program economics from the Boost partner
  agreement during reconciliation. No public usage-based rate card exists.
sources:
- https://boostinsurance.com/platform/
